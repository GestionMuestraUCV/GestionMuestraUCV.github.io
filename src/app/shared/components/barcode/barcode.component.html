

<svg id="barcode" ></svg>

<form #loginForm="ngForm" (ngSubmit)="handleRegister(loginForm.value)">
  <div class="main" >
    <div class="input-fields">
      <span  class="Text">Cantidad: </span>
      <input name="cantidad" ngModel placeholder="N°" id="cantidad" type="number" min="1" max="5" class="input-field" [(ngModel)]= "num"/>
    </div>


    <button class="print">Imprimir</button>
  </div>
</form>

<button id="volver" (click)="backPage()"></button>
